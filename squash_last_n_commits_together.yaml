---
name: Squash commits up to a selected commit
command: "git reset --soft {{commit}} && git commit"
description: Shows recent commit history, lets you pick a commit, and squashes everything after it into a new commit.
arguments:
  - name: commit
    arg_type: Enum
    enum_name: commits
    enum_command: "git log --oneline -20"
    description: Squash all commits after this one
    default_value: ~
tags:
  - git
  - squash
  - rewrite-history
source_url: ~
author: ~
author_url: ~
shells: []
