---
name: List Largest Files in Git History
command: "git rev-list --objects --all | git cat-file --batch-check='%(objecttype) %(objectname) %(objectsize) %(rest)' | sed -n 's/^blob //p' | sort -rnk2 | head -{{num_files}}"
description: Find the largest blob objects in the entire Git history to identify repo bloat
arguments:
  - name: num_files
    arg_type: Text
    description: Number of largest files to show
    default_value: "20"
tags:
  - git
  - maintenance
source_url: ~
author: ~
author_url: ~
shells:
  - Bash
  - Zsh
