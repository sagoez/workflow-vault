<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: #0f1117;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .card {
    text-align: center;
  }
  .icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100px;
    height: 100px;
    background: #1a1d27;
    border: 2px solid #2e3345;
    border-radius: 20px;
    margin-bottom: 32px;
  }
  .icon span {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 48px;
    font-weight: 700;
    color: #6c8aff;
  }
  h1 {
    font-size: 64px;
    font-weight: 700;
    color: #e1e4ed;
    letter-spacing: -0.03em;
    margin-bottom: 16px;
  }
  p {
    font-size: 24px;
    color: #8b90a0;
    max-width: 700px;
    line-height: 1.5;
  }
  .tags {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 32px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 16px;
    padding: 6px 16px;
    border-radius: 6px;
    background: #2a2f40;
    color: #a0b0d0;
  }
  .glow {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(108,138,255,0.08) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <div class="icon"><span>&gt;_</span></div>
    <h1>Workflow Vault</h1>
    <p>90+ reusable shell workflows — browse, fill in args, copy.</p>
    <div class="tags">
      <span class="tag">git</span>
      <span class="tag">aws</span>
      <span class="tag">docker</span>
      <span class="tag">ffmpeg</span>
      <span class="tag">kubernetes</span>
      <span class="tag">python</span>
      <span class="tag">ssh</span>
    </div>
  </div>
</body>
</html>
