<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: #1a1a1a;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .card {
    text-align: center;
  }
  .icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100px;
    height: 100px;
    background: #e8e8e8;
    border-radius: 22px;
    margin-bottom: 32px;
  }
  .icon span {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 52px;
    font-weight: 900;
    font-style: italic;
    color: #1a1a1a;
  }
  h1 {
    font-size: 64px;
    font-weight: 700;
    color: #e8e8e8;
    letter-spacing: -0.03em;
    margin-bottom: 16px;
  }
  p {
    font-size: 24px;
    color: #999;
    max-width: 700px;
    line-height: 1.5;
  }
  .tags {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 32px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 16px;
    padding: 6px 16px;
    border-radius: 6px;
    background: #2e2e2e;
    color: #999;
  }
  .glow {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,232,232,0.04) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <div class="icon"><span>wf</span></div>
    <h1>Workflow Vault</h1>
    <p>90+ reusable shell workflows — browse, fill in args, copy.</p>
    <div class="tags">
      <span class="tag">git</span>
      <span class="tag">aws</span>
      <span class="tag">docker</span>
      <span class="tag">ffmpeg</span>
      <span class="tag">kubernetes</span>
      <span class="tag">python</span>
      <span class="tag">ssh</span>
    </div>
  </div>
</body>
</html>
